<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'Oswald', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3d59, #2a7f62);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #ffffff;
            border-radius: 14px;
            padding: 35px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

            .login-card h3 {
                color: #1e3d59;
                font-weight: 700;
            }

            .login-card p {
                color: #2a7f62;
                font-size: 14px;
            }

        .form-label {
            font-weight: 500;
            color: #1e3d59;
        }

        /* for INPUT */
        .input-group {
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            transition: 0.2s;
        }

        .input-group-text {
            background: #eaf6ff;
            border: none;
            color: #1e3d59;
            padding: 0 14px;
        }

        .form-control {
            border: none;
            padding: 12px;
        }

            .form-control:focus {
                box-shadow: none;
            }

        .input-group:has(input:focus) {
            border: 2px solid #2a7f62;
            box-shadow: 0 0 0 0.15rem rgba(42,127,98,0.25);
        }

        /* ERROR MESSAGE */
        .error-text {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        /* BUTTON */
        .btn-login {
            background: linear-gradient(135deg, #1e3d59, #3a6ea5);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
        }

            .btn-login:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 25px rgba(0,0,0,0.25);
                color: #fff !important;
            }

        .for_pass {
            font-size: 10px;
            text-align: right;
            margin-top: 10px;
        }

            .for_pass a {
                color: #2a7f62;
                text-decoration: none;
            }

        .login-footer {
            font-size: 16px;
            margin-top: 20px;
            text-align: center;
        }
            .login-footer a {
                color: #2a7f62;
                text-decoration: none;
                font-size: 13px;
            }
    </style>
</head>

<body>
   

    <div class="login-card">
        <div class="text-center mb-4">
            <h3>Admin Login</h3>
            <p>Smt. K. B. Parekh College of Computer Science</p>
        </div>

        <form id="loginForm" novalidate>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="Enter admin email">
                </div>
                <p class="error-text" id="emailError"></p>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="Enter password">
                </div>
                <p class="error-text" id="passwordError"></p>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-login">Login</button>
                <div class="for_pass">
                    <a href="forgot_password.html">Forgot Password?</a>
                </div>
            </div>
        </form>

        <div class="login-footer">
            <p class="mb-1">Authorized personnel only</p>
            <a href="index.html">Go Back</a>

        </div>
    </div>
    

    <script>
        const form = document.getElementById("loginForm");
        const email = document.getElementById("email");
        const password = document.getElementById("password");

        const emailError = document.getElementById("emailError");
        const passwordError = document.getElementById("passwordError");

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const numberRegex = /[0-9]/;



        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            let isValid = true;

            // Email validation
            if (email.value.trim() === "") {
                emailError.textContent = "Email is required";

                emailError.style.color = "red";
                emailError.style.display = "block";
                isValid = false;
            } else if (!emailRegex.test(email.value)) {
                emailError.textContent = "Enter a valid email address";
                emailError.style.color = "red";
                emailError.style.display = "block";
                isValid = false;
            } else {
                emailError.style.display = "none";
            }

            // Password validation
            if (password.value.trim() === "") {
                passwordError.textContent = "Password is required";
                passwordError.style.color = "red";
                passwordError.style.display = "block";
                isValid = false;
            } else if (password.value.length < 6) {
                passwordError.textContent = "Password must be at least 6 characters";
                passwordError.style.color = "red";
                passwordError.style.display = "block";
                isValid = false;
            } else if (!numberRegex.test(password.value)) {
                passwordError.textContent = "Password must contain at least one number";
                passwordError.style.color = "red";
                passwordError.style.display = "block";
                isValid = false;
            } else {
                passwordError.style.display = "none";
            }

            if (!isValid) return;

    
    console.log("📩 Email entered:", email);
    alert("Submitting request...");

    try {
        const response = await fetch("https://localhost:7121/api/Login/forgot-password", {
            method: "POST",
            headers: {   // ✅ FIXED (you missed this)
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email: email })
        });

        console.log("🌐 Response status:", response.status);

        const data = await response.json();

        console.log("📦 Response data:", data);
        alert("API Response: " + JSON.stringify(data));

        if (response.ok) {
            const token = data.resetToken;

            console.log("🔑 Token received:", token);
            alert("Token received! Redirecting...");

            // ✅ REDIRECT
            window.location.href =
                `reset.html?email=${encodeURIComponent(email)}&token=${token}`;
        } else {
            console.warn("❌ API Error:", data.message);
            alert(data.message || "Error from API");
        }

    } catch (err) {
        console.error("🔥 Fetch error:", err);
        alert("Server error: " + err.message);
    }
});
</script>
    

</body>
</html>

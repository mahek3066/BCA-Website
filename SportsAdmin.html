<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Sports Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="SportsAdmin.css" />

</head>
<body>

    <div class="box">

        <!-- UPDATED HEADER WRAPPER -->
        <div class="header-wrapper">
            <h2>⚙️ Admin - Sports Gallery</h2>
            <button class="btn green" onclick="openAddPhotoModal()">
                <i class="fas fa-plus"></i> Add Sports Photo
            </button>
        </div>
        <!-- END UPDATED HEADER WRAPPER -->

        <div id="msg" class="msg"></div>

        <!-- Gallery List - Table View -->
        <div class="gallery-list">
            <h3>📸 All Photos (<span id="totalCount">0</span>)</h3>
            <table class="gallery-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Image</th>
                        <th>Caption</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="photoList">
                    <!-- Rows will be populated by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add Photo Modal -->
    <div id="addPhotoModal" class="add-photo-modal">
        <div class="add-photo-box">
            <h3>📸 Add New Sports Photo</h3>

            <div class="form-group">
                <label>Select Photo:</label>
                <input type="file" id="photoInput" accept="image/*">
                <div id="photoError" class="error-text">⚠️ Please select a photo!</div>
            </div>

            <div class="form-group">
                <label>Write Caption:</label>
                <textarea id="captionInput" placeholder="e.g. Cricket Team 2024"></textarea>
                <div id="captionError" class="error-text">⚠️ Please write a caption!</div>
            </div>

            <div class="add-photo-actions">
                <button class="btn gray" onclick="closeAddPhotoModal()">Cancel</button>
                <button class="btn green" onclick="savePhoto()">💾 Save Photo</button>
            </div>
        </div>
    </div>

    <!-- Edit Photo Modal (NEW) -->
    <div id="editPhotoModal" class="edit-photo-modal">
        <div class="edit-photo-box">
            <h3>✏️ Edit Photo Details</h3>

            <!-- Hidden input to store ID -->
            <input type="hidden" id="editPhotoId">

            <div class="form-group">
                <label>Current Image:</label>
                <img id="editImagePreview" class="preview-image" src="" alt="Preview">
            </div>

            <div class="form-group">
                <label>Update Caption:</label>
                <textarea id="editCaptionInput" rows="3"></textarea>
            </div>

            <div class="edit-photo-actions">
                <button class="btn gray" onclick="closeEditModal()">Cancel</button>
                <button class="btn green" onclick="saveEditPhoto()">💾 Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal-overlay">
        <div class="modal-box">
            <h3>🗑️ Delete Image</h3>
            <p>Are you sure you want to delete this image?</p>
            <div class="modal-buttons">
                <button class="btn gray" onclick="closeModal()">✖ Cancel</button>
                <button class="btn red" onclick="confirmDelete()">🗑️ Delete</button>
            </div>
        </div>
    </div>

    <!-- JavaScript for Functionality -->
    <script>
        // ============================================
        // SPORTS GALLERY ADMIN - FULL JAVASCRIPT
        // ============================================

        let deleteId = null;
        let editId = null;

        // Show success message
        function showMsg(text) {
            const m = document.getElementById('msg');
            m.textContent = text;
            m.className = 'msg show success';
            setTimeout(() => m.className = 'msg', 3000);
        }

        // Clear all errors
        function clearErrors() {
            document.getElementById('photoInput').classList.remove('error');
            document.getElementById('captionInput').classList.remove('error');
            document.getElementById('photoError').classList.remove('show');
            document.getElementById('captionError').classList.remove('show');
        }

        // Show error for specific field
        function showError(fieldId, errorId) {
            document.getElementById(fieldId).classList.add('error');
            document.getElementById(errorId).classList.add('show');
        }

        // Clear error when user selects file
        document.getElementById('photoInput').addEventListener('change', function () {
            if (this.files.length > 0) {
                this.classList.remove('error');
                document.getElementById('photoError').classList.remove('show');

                // Validate file size on selection (4MB limit)
                const file = this.files[0];
                if (file.size > 4 * 1024 * 1024) {
                    alert('⚠️ Image size must be less than 4MB! Current size: ' + (file.size / 1024 / 1024).toFixed(2) + ' MB');
                    this.value = '';
                }
            }
        });

        // Clear error when user types caption
        document.getElementById('captionInput').addEventListener('input', function () {
            if (this.value.trim() !== '') {
                this.classList.remove('error');
                document.getElementById('captionError').classList.remove('show');
            }
        });

        // Open Add Photo Modal
        function openAddPhotoModal() {
            document.getElementById('addPhotoModal').classList.add('show');
            clearErrors();
        }

        // Close Add Photo Modal
        function closeAddPhotoModal() {
            document.getElementById('addPhotoModal').classList.remove('show');
            clearErrors();
            document.getElementById('photoInput').value = '';
            document.getElementById('captionInput').value = '';
        }

        // Save new photo with compression
        function savePhoto() {
            const input = document.getElementById('photoInput');
            const captionInput = document.getElementById('captionInput');
            const caption = captionInput.value;
            const file = input.files[0];

            // Clear previous errors
            clearErrors();

            let hasError = false;

            // Validate - Check if photo is selected
            if (!file) {
                showError('photoInput', 'photoError');
                hasError = true;
            }

            // Validate - Check if caption is written
            if (!caption.trim()) {
                showError('captionInput', 'captionError');
                hasError = true;
            }

            // Validate - Check file size (4MB limit)
            if (file && file.size > 4 * 1024 * 1024) {
                alert('⚠️ Image size must be less than 4MB! Current size: ' + (file.size / 1024 / 1024).toFixed(2) + ' MB');
                input.value = '';
                hasError = true;
            }

            if (hasError) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                // Compress image using Canvas
                const img = new Image();
                img.src = e.target.result;

                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    // Resize to max 800px width
                    const maxWidth = 800;
                    const scaleSize = maxWidth / img.width;
                    canvas.width = maxWidth;
                    canvas.height = img.height * scaleSize;

                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    // Convert to base64 with quality 0.7
                    const compressedImage = canvas.toDataURL('image/jpeg', 0.7);

                    const photo = {
                        id: Date.now(),
                        image: compressedImage,
                        caption: caption,
                        date: new Date().toISOString().split('T')[0]
                    };

                    try {
                        let photos = JSON.parse(localStorage.getItem('sportsGallery') || '[]');
                        photos.unshift(photo);
                        localStorage.setItem('sportsGallery', JSON.stringify(photos));

                        input.value = '';
                        captionInput.value = '';

                        
                        loadPhotos();
                        closeAddPhotoModal();
                        checkStorage();
                    } catch (error) {
                        
                        console.error('localStorage error:', error);
                    }
                };
            };
            reader.readAsDataURL(file);
        }

        // Load all photos
        function loadPhotos() {
            let photos = JSON.parse(localStorage.getItem('sportsGallery') || '[]');
            document.getElementById('totalCount').innerText = photos.length;

            let html = '';
            if (photos.length === 0) {
                html = '<tr><td colspan="4" style="text-align:center; padding: 20px;">No photos uploaded yet!</td></tr>';
            } else {
                photos.forEach(p => {
                    html += `<tr>
                            <td class="col-date">
                                <i class="fas fa-calendar-alt"></i> ${formatDate(p.date)}
                            </td>
                            <td class="col-image">
                                <img src="${p.image}" alt="${p.caption}">
                            </td>
                            <td class="col-caption">
                                <strong>${p.caption}</strong>
                            </td>
                            <td class="col-action">
                                <div class="action-buttons">
                                    <button class="btn orange" onclick="openEditModal(${p.id})">✏️</button>
                                    <button class="btn red" onclick="openDeleteModal(${p.id})">🗑️</button>
                                </div>
                            </td>
                        </tr>`;
                });
            }
            document.getElementById('photoList').innerHTML = html;
        }

        // Helper: Format Date
        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('en-US', options);
        }

        // Open delete confirmation modal
        function openDeleteModal(id) {
            deleteId = id;
            document.getElementById('deleteModal').classList.add('show');
        }

        // Close delete modal
        function closeModal() {
            deleteId = null;
            document.getElementById('deleteModal').classList.remove('show');
        }

        // Confirm delete
        function confirmDelete() {
            if (deleteId) {
                let photos = JSON.parse(localStorage.getItem('sportsGallery') || '[]');
                photos = photos.filter(p => p.id !== deleteId);
                localStorage.setItem('sportsGallery', JSON.stringify(photos));

                
                loadPhotos();
                closeModal();
                checkStorage();
            }
        }

        // Open Edit Photo Modal
        function openEditModal(id) {
            let photos = JSON.parse(localStorage.getItem('sportsGallery') || '[]');
            let photo = photos.find(p => p.id === id);

            if (!photo) return;

            editId = id;
            document.getElementById('editPhotoId').value = id;
            document.getElementById('editImagePreview').src = photo.image;
            document.getElementById('editCaptionInput').value = photo.caption;
            document.getElementById('editPhotoModal').classList.add('show');
        }

        // Close Edit Photo Modal
        function closeEditModal() {
            document.getElementById('editPhotoModal').classList.remove('show');
            editId = null;
            document.getElementById('editCaptionInput').value = '';
        }

        // Save Edit Photo
        function saveEditPhoto() {
            const captionInput = document.getElementById('editCaptionInput');
            const caption = captionInput.value;

            if (!caption.trim()) {
                captionInput.classList.add('error');
                return;
            }

            try {
                let photos = JSON.parse(localStorage.getItem('sportsGallery') || '[]');
                let photo = photos.find(p => p.id === editId);

                if (photo) {
                    photo.caption = caption.trim();
                    localStorage.setItem('sportsGallery', JSON.stringify(photos));
                    
                    loadPhotos();
                    closeEditModal();
                }
            } catch (error) {
                alert('⚠️ Storage error!');
                console.error('localStorage error:', error);
            }
        }

        // Check storage usage
        function checkStorage() {
            let total = 0;
            for (let key in localStorage) {
                if (localStorage.hasOwnProperty(key)) {
                    total += localStorage[key].length * 2;
                }
            }
            const mb = (total / 1024 / 1024).toFixed(2);
            document.getElementById('storageUsed').innerText = mb;

            const storageInfo = document.getElementById('storageInfo');
            if (mb > 4) {
                storageInfo.classList.add('show');
            } else {
                storageInfo.classList.remove('show');
            }
        }

        // Close delete modal when clicking outside
        document.getElementById('deleteModal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Close add photo modal when clicking outside
        document.getElementById('addPhotoModal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeAddPhotoModal();
            }
        });

        // Close edit photo modal when clicking outside
        document.getElementById('editPhotoModal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeEditModal();
            }
        });

        // Load on start
        loadPhotos();
        checkStorage();
    </script>
</body>
</html>

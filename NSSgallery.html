<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - National Service Scheme</title>
    <style>
        /* Global Styles */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.8;
        }

        /* Header */
        .header {
            background-color: #1e3d59;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

            .header h1 {
                margin: 0;
                font-size: 36px;
                font-weight: bold;
            }

            .header .category-title {
                color: #ff9800;
                font-size: 24px;
                margin-top: 10px;
            }

        

        /* Container */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 30px;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            aspect-ratio: 4/3;
            background-color: #ddd;
        }

            .gallery-item img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform 0.3s ease;
            }

            .gallery-item:hover img {
                transform: scale(1.1);
            }

            .gallery-item .overlay {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                background: linear-gradient(transparent, rgba(0,0,0,0.8));
                padding: 30px 15px 15px;
                opacity: 0;
                transition: opacity 0.3s ease;
            }

            .gallery-item:hover .overlay {
                opacity: 1;
            }

            .gallery-item .overlay p {
                color: white;
                margin: 0;
                font-size: 14px;
                text-align: center;
                font-weight: bold;
            }

            .gallery-item .overlay .date {
                color: #ccc;
                font-size: 12px;
                margin-top: 5px;
                display: block;
            }

        /* Category Filter Buttons */
        .category-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .category-btn {
            padding: 10px 20px;
            background: white;
            border: 2px solid #1e3d59;
            color: #1e3d59;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

            .category-btn:hover,
            .category-btn.active {
                background: #1e3d59;
                color: white;
            }

        /* No Photos Message */
        .no-photos {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 8px;
            grid-column: 1 / -1;
        }

            .no-photos h3 {
                color: #1e3d59;
                margin-bottom: 15px;
            }

            .no-photos a {
                display: inline-block;
                margin-top: 15px;
                padding: 10px 20px;
                background: #ff9800;
                color: white;
                text-decoration: none;
                border-radius: 4px;
            }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>National Service Scheme</h1>
        <p class="category-title" id="pageTitle">Photo Gallery</p>
    </div>

    <div class="container">

        <!-- Category Filter -->
        <div class="category-filter" id="categoryFilter">
            <button class="category-btn active" onclick="filterGallery('all')">All Photos</button>
            <button class="category-btn" onclick="filterGallery('Blood Donation')">Blood Donation</button>
            <button class="category-btn" onclick="filterGallery('Tree Plantation')">Tree Plantation</button>
            <button class="category-btn" onclick="filterGallery('Clean-up')">Clean-up Drive</button>
            <button class="category-btn" onclick="filterGallery('Health')">Health Camp</button>
            <button class="category-btn" onclick="filterGallery('Literacy')">Literacy Program</button>
            <button class="category-btn" onclick="filterGallery('NSS Camp')">NSS Camp</button>
            <button class="category-btn" onclick="filterGallery('Women Empowerment')">Women Empowerment</button>
            <button class="category-btn" onclick="filterGallery('Old Age Home')">Old Age Home</button>
            <button class="category-btn" onclick="filterGallery('Road Safety')">Road Safety</button>
        </div>

        <!-- Gallery Grid - ONLY Shows Admin Uploaded Photos -->
        <div class="gallery-grid" id="galleryContainer">
            <!-- Photos loaded from LocalStorage will appear here -->
        </div>

    </div>

    <!-- JavaScript -->
    <script>
        // Get category from URL
        const urlParams = new URLSearchParams(window.location.search);
        let currentCategory = urlParams.get('category') || 'all';

        // Set page title based on category
        if (currentCategory !== 'all') {
            document.getElementById('pageTitle').textContent = currentCategory + ' - Photos';
        }

        // Load gallery on page load
        document.addEventListener('DOMContentLoaded', function () {
            loadGallery(currentCategory);
            highlightActiveButton();
        });

        function highlightActiveButton() {
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => {
                if (btn.textContent === 'All Photos' && currentCategory === 'all') {
                    btn.classList.add('active');
                } else if (btn.textContent === currentCategory) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function filterGallery(category) {
            currentCategory = category;

            // Update URL without reloading
            if (category === 'all') {
                window.history.replaceState({}, '', 'NSSgallery.html');
                document.getElementById('pageTitle').textContent = 'Photo Gallery';
            } else {
                window.history.replaceState({}, '', 'NSSgallery.html?category=' + encodeURIComponent(category));
                document.getElementById('pageTitle').textContent = category + ' - Photos';
            }

            // Update active button
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => {
                if ((category === 'all' && btn.textContent === 'All Photos') || btn.textContent === category) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            loadGallery(category);
        }

        function loadGallery(category) {
            const container = document.getElementById('galleryContainer');

            // Get ONLY admin uploaded photos from LocalStorage
            let gallery = JSON.parse(localStorage.getItem('nssGallery')) || [];

            // Filter by category
            if (category !== 'all') {
                gallery = gallery.filter(photo => photo.caption === category);
            }

            // Sort by date (newest first)
            gallery.reverse();

            // If no admin uploaded photos
            if (gallery.length === 0) {
                container.innerHTML = `
                        <div class="no-photos">
                            <h3>📷 No Photos Found</h3>
                            <p>No photos uploaded by admin yet.</p>
                            <p>Go to Admin Panel to upload photos!</p>
                            <a href="NSSadmin.html">⚙️ Upload Photos</a>
                        </div>
                    `;
                return;
            }

            // Display ONLY admin uploaded photos
            let html = '';
            gallery.forEach(photo => {
                html += `
                        <div class="gallery-item">
                            <img src="${photo.image}" alt="${photo.caption}"
                                 onerror="this.src='https://placehold.co/400x300/1e3d59/white?text=No+Image'">
                            <div class="overlay">
                                <p>${photo.caption}</p>
                                <span class="date">${photo.date || ''}</span>
                            </div>
                        </div>
                    `;
            });

            container.innerHTML = html;
        }
    </script>

</body>
</html>

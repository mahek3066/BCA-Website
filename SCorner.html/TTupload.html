<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Admin Panel - Upload Time Table</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
        }

        .back-btn {
            background-color: #1e3d59;
            color: white;
            padding: 10px 20px;
            margin:20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }

            .back-btn:hover {
                background-color: #3d6ea5;
              
            }


        .header {
            background-color: #1e3d59;
            color: white;
            text-align: center;
            padding: 30px 20px;
        }

            .header h1 {
                font-size: 36px;
                font-weight: bold;
            }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .admin-panel {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

            .admin-panel h2 {
                color: #1e3d59;
                margin-bottom: 30px;
                text-align: center;
                font-size: 28px;
                border-bottom: 2px solid #1e3d59;
                padding-bottom: 15px;
            }

        .form-group {
            margin-bottom: 25px;
        }

            .form-group label {
                display: block;
                margin-bottom: 10px;
                font-weight: bold;
                color: #333;
                font-size: 16px;
            }

            .form-group input[type="text"] {
                width: 100%;
                padding: 14px;
                border: 2px solid #ddd;
                border-radius: 6px;
                font-size: 16px;
                transition: border-color 0.3s;
            }

                .form-group input[type="text"]:focus {
                    outline: none;
                    border-color: #1e3d59;
                }

            .form-group input[type="file"] {
                width: 100%;
                padding: 14px;
                border: 2px dashed #1e3d59;
                border-radius: 6px;
                background-color: #f9f9f9;
                cursor: pointer;
            }

                .form-group input[type="file"]:hover {
                    background-color: #eef2f7;
                }

        .file-info {
            font-size: 13px;
            color: #666;
            margin-top: 8px;
        }

        .upload-btn {
            width: 100%;
            background-color: #1e3d59;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

            .upload-btn:hover {
                background-color: #2a5278;
            }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            border: 1px solid #f5c6cb;
        }

        .preview-section {
            margin-top: 30px;
            display: none;
        }

            .preview-section h3 {
                color: #1e3d59;
                margin-bottom: 15px;
                text-align: center;
            }

        .preview-image {
            max-width: 100%;
            border: 2px solid #ddd;
            border-radius: 6px;
            display: block;
            margin: 0 auto;
        }

        .uploaded-list {
            margin-top: 40px;
        }

            .uploaded-list h3 {
                color: #1e3d59;
                margin-bottom: 20px;
                text-align: center;
                font-size: 24px;
            }

        .uploaded-item {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ddd;
        }

        .uploaded-item-info {
            flex: 1;
        }

        .uploaded-item-name {
            font-weight: bold;
            color: #1e3d59;
            font-size: 18px;
        }

        .uploaded-item-date {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .uploaded-item-actions {
            display: flex;
            gap: 10px;
        }

        .view-btn {
            background-color: #3a6ea5;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

            .view-btn:hover {
                background-color: #1e3d59;
            }

        .delete-btn {
            background-color: #c0392b;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

            .delete-btn:hover {
                background-color: #e74c3c;
            }

        .no-data {
            text-align: center;
            padding: 30px;
            color: #c0392b;
            background-color: #fdf2f2;
            border-radius: 6px;
            border: 2px dashed #c0392b;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 10px;
        }

            .close:hover {
                color: black;
            }

        .modal-image {
            max-width: 100%;
            display: block;
            margin: 20px auto;
        }

        .modal-title {
            text-align: center;
            color: #1e3d59;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Admin Panel - Upload Time Table</h1>
    </div>

    <div class="container">
        <div class="admin-panel">
            <h2>📤 Upload Time Table</h2>

            <div id="successMessage" class="success-message"></div>
            <div id="errorMessage" class="error-message"></div>

            <div class="form-group">
                <label for="timetableName">Time Table Name:</label>
                <input type="text" id="timetableName" placeholder="Enter timetable name (e.g., BCA Time Table)">
            </div>

            <div class="form-group">
                <label for="timetableImage">Upload Time Table Image:</label>
                <input type="file" id="timetableImage" accept="image/*" onchange="previewImage()">
                <div class="file-info">Supported formats: JPG, PNG, GIF (Max size: 5MB)</div>
            </div>

            <button class="upload-btn" onclick="uploadTimetable()">Upload Time Table</button>

            <a href="index.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i> Back to Time Table Page
            </a>

            <!-- Preview Section -->
            <div class="preview-section" id="previewSection">
                <h3>Image Preview</h3>
                <img id="previewImage" class="preview-image" src="" alt="Preview">
            </div>
        </div>

        <!-- Uploaded Timetables List -->
        <div class="uploaded-list">
            <h3>📋 Uploaded Time Tables</h3>
            <div id="uploadedItems">
                <div class="no-data">No timetables uploaded yet</div>
            </div>
        </div>
    </div>

    <!-- Modal for viewing timetable -->
    <div id="viewModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" class="modal-title"></h2>
            <img id="modalImage" class="modal-image" src="" alt="Time Table">
        </div>
    </div>

    <script>
        // Initialize timetables array from localStorage
        let timetables = JSON.parse(localStorage.getItem('timetables')) || [];

        // Load timetables on page load
        document.addEventListener('DOMContentLoaded', function () {
            loadTimetables();
        });

        // Preview image before upload
        function previewImage() {
            const input = document.getElementById('timetableImage');
            const previewSection = document.getElementById('previewSection');
            const previewImage = document.getElementById('previewImage');

            if (input.files && input.files[0]) {
                const reader = new FileReader();

                reader.onload = function (e) {
                    previewImage.src = e.target.result;
                    previewSection.style.display = 'block';
                };

                reader.readAsDataURL(input.files[0]);
            } else {
                previewSection.style.display = 'none';
            }
        }

        // Upload new timetable
        function uploadTimetable() {
            const name = document.getElementById('timetableName').value.trim();
            const imageInput = document.getElementById('timetableImage');
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');

            // Hide messages
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';

            // Validate inputs
            if (!name) {
                showError('Please enter a timetable name');
                return;
            }

            if (!imageInput.files || !imageInput.files[0]) {
                showError('Please select an image file');
                return;
            }

            const file = imageInput.files[0];

            // Validate file type
            const validTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                showError('Please select a valid image file (JPG, PNG, GIF)');
                return;
            }

            // Validate file size (max 5MB)
            if (file.size > 5 * 1024 * 1024) {
                showError('File size should be less than 5MB');
                return;
            }

            // Read and convert image to base64
            const reader = new FileReader();

            reader.onload = function (e) {
                const newTimetable = {
                    id: Date.now(),
                    name: name,
                    uploadDate: new Date().toISOString().split('T')[0],
                    imageData: e.target.result,
                    fileName: file.name
                };

                timetables.push(newTimetable);
                saveToLocalStorage();
                loadTimetables();

                // Clear form
                document.getElementById('timetableName').value = '';
                document.getElementById('timetableImage').value = '';
                document.getElementById('previewSection').style.display = 'none';

                showSuccess('Time Table uploaded successfully!');
            };

            reader.onerror = function () {
                showError('Error reading file. Please try again.');
            };

            reader.readAsDataURL(file);
        }

        // Load and display uploaded timetables
        function loadTimetables() {
            const container = document.getElementById('uploadedItems');

            if (timetables.length === 0) {
                container.innerHTML = '<div class="no-data">⚠️ No timetables uploaded yet</div>';
                return;
            }

            let html = '';
            timetables.forEach(function (timetable) {
                html += `
            <div class="uploaded-item">
                <div class="uploaded-item-info">
                    <div class="uploaded-item-name">${timetable.name}</div>
                    <div class="uploaded-item-date">Uploaded on: ${timetable.uploadDate}</div>
                </div>
                <div class="uploaded-item-actions">
                    <button class="view-btn" onclick="viewTimetable(${timetable.id})">View</button>
                    <button class="delete-btn" onclick="deleteTimetable(${timetable.id})">Delete</button>
                </div>
            </div>
        `;
            });

            container.innerHTML = html;
        }

        // View timetable image
        function viewTimetable(id) {
            const timetable = timetables.find(t => t.id === id);
            if (!timetable) return;

            document.getElementById('modalTitle').textContent = timetable.name;
            document.getElementById('modalImage').src = timetable.imageData;
            document.getElementById('viewModal').style.display = 'block';
        }

        // Delete timetable
        function deleteTimetable(id) {
            if (confirm('Are you sure you want to delete this timetable?')) {
                timetables = timetables.filter(t => t.id !== id);
                saveToLocalStorage();
                loadTimetables();
                showSuccess('Time Table deleted successfully!');
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('viewModal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('viewModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Save to localStorage
        function saveToLocalStorage() {
            try {
                localStorage.setItem('timetables', JSON.stringify(timetables));
            } catch (e) {
                console.error('Error saving to localStorage:', e);
            }
        }

        // Show success message
        function showSuccess(message) {
            const msg = document.getElementById('successMessage');
            msg.textContent = message;
            msg.style.display = 'block';

            setTimeout(() => {
                msg.style.display = 'none';
            }, 3000);
        }

        // Show error message
        function showError(message) {
            const msg = document.getElementById('errorMessage');
            msg.textContent = message;
            msg.style.display = 'block';

            setTimeout(() => {
                msg.style.display = 'none';
            }, 3000);
        }
       
    </script>
</body>
</html>

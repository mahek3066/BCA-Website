<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Faculty Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="AddFaculty.css">
</head>

<body>
    <div class="header">
        <h1>Admin Panel - Faculty Management</h1>
        <div class="header-buttons">
            <button id="addFacultyBtn" class="header-btn">+ Add Faculty</button>
            <a href="FacultyPage.html" class="header-btn header-btn-secondary">Back To FacultyPage</a>
        </div>
    </div>

    <div class="container">
        <div class="uploaded-list">
            <div class="list-header">
                <h3>Faculty List</h3>
                <input type="text" id="facultySearch" placeholder="Search Faculty...">
            </div>

            <div id="uploadedItems">
            </div>
        </div>
    </div>

    <div id="facultyModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeFacultyModal()">&times;</span>
            <h2 id="modalTitle" class="modal-title">Add Faculty</h2>

            <div id="successMessage" class="success-message"></div>
            <div id="errorMessage" class="error-message"></div>

            <input type="hidden" id="facultyId">

            <div class="form-group">
                <label for="facultyName">Name:</label>
                <input type="text" id="facultyName" placeholder="Enter Faculty Name">
                <div class="field-error" id="nameError"></div>
            </div>

            <div class="form-group">
                <label for="facultyDesignation">Designation:</label>
                <input type="text" id="facultyDesignation" placeholder="e.g. Professor, HOD">
                <div class="field-error" id="designationError"></div>
            </div>

            <div class="form-group">
                <label for="facultyDepartment">Department:</label>
                <select id="facultyDepartment">
                    <option value="">-- Select Department --</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Software engineering">Software engineering</option>
                    <option value="IT application">IT application</option>
                    <option value="Skill">Skill</option>
                    <option value="Mathematics">Mathematics</option>
                </select>
                <div class="field-error" id="departmentError"></div>
            </div>

            <div class="form-group">
                <label for="facultyDescription">Description:</label>
                <input type="text" id="facultyDescription" placeholder="Enter Awards,Research,Boigraphy,Contact Information">
                <div class="field-error" id="descriptionError"></div>
            </div>

            <div class="form-group">
                <label for="facultyEmail">Email:</label>
                <input type="email" id="facultyEmail" placeholder="e.g. professor@gmail.com">
                <div class="field-error" id="emailError"></div>
            </div>
                        
            <div class="form-group">
                <label for="facultyImage">Image:</label>
                <input type="file" id="facultyImage" accept="image/*" onchange="previewImage()">
                <div class="file-info">Supported formats: JPG, PNG (Max 2MB)</div>
                <div class="field-error" id="imageError"></div>
            </div>

            <div class="preview-section" id="previewSection">
                <h3>Image Preview</h3>
                <img id="previewImage" class="preview-image" src="" alt="Preview">
            </div>

            <div class="button-group">
                <button class="upload-btn" id="saveBtn" onclick="saveFaculty()">Save Faculty</button>
                <button class="cancel-btn" id="cancelBtn" onclick="closeFacultyModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="viewModal" class="modal">
        <div class="modal-content view-modal-content">
            <span class="close" onclick="closeViewModal()">&times;</span>
            <h2 id="modalTitle" class="modal-title"></h2>
            <p id="modalDesignation" class="modal-desig"></p>
            <p id="modalDepartment" class="modal-dept"></p>
            <p id="modelDescription" class="model-desc"></p>
            <img id="modalImage" class="modal-image" src="" alt="Faculty Image">
        </div>
    </div>

    <div id="deleteModal" class="modal">
        <div class="modal-content delete-modal-content">
            <div class="delete-modal-icon">⚠️</div>
            <h2 style="color: #333; margin-bottom: 10px;">Delete Faculty?</h2>
            <p class="delete-modal-text">Are you sure you want to delete this faculty? This action cannot be undone.</p>
            <div class="modal-buttons">
                <button class="delete-btn" onclick="confirmDelete()">Delete</button>
                <button class="cancel-btn" onclick="closeDeleteModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize faculty array from localStorage
        let facultyData = JSON.parse(localStorage.getItem("facultyData")) || [];
        let idToDelete = null;

        // Load faculty on page load
        document.addEventListener('DOMContentLoaded', function () {
            loadFaculty();
        });

        // Open Add Faculty Modal
        document.getElementById('addFacultyBtn').addEventListener('click', function () {
            resetForm();
            document.getElementById('facultyModal').style.display = 'flex';
        });

        // Close Faculty Modal
        function closeFacultyModal() {
            document.getElementById('facultyModal').style.display = 'none';
            resetForm();
        }

        // Close View Modal
        function closeViewModal() {
            document.getElementById('viewModal').style.display = 'none';
        }

        // Close Delete Modal
        function closeDeleteModal() {
            document.getElementById('deleteModal').style.display = 'none';
            idToDelete = null;
        }

        // Preview image before upload
        function previewImage() {
            const input = document.getElementById('facultyImage');
            const previewSection = document.getElementById('previewSection');
            const previewImage = document.getElementById('previewImage');

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    previewImage.src = e.target.result;
                    previewSection.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            } else {
                previewSection.style.display = 'none';
            }
        }

        // Save (Add or Update) Faculty
        function saveFaculty() {
            const id = document.getElementById('facultyId').value;
            const name = document.getElementById('facultyName').value.trim();
            const designation = document.getElementById('facultyDesignation').value.trim();
            const department = document.getElementById('facultyDepartment').value.trim();
            const description = document.getElementById('facultyDescription').value.trim();
            const email = document.getElementById('facultyEmail').value.trim();       
            const imageInput = document.getElementById('facultyImage');

            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');

            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            clearFieldErrors();

            let hasError = false;

            // Validation
            if (!name) { showFieldError('facultyName', 'Please enter faculty name'); hasError = true; }
            if (!designation) { showFieldError('facultyDesignation', 'Please enter designation'); hasError = true; }
            if (!department) { showFieldError('facultyDepartment', 'Please enter department'); hasError = true; }
            if (!description) { showFieldError('facultyDescription', 'Please enter Description'); hasError = true; }

            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!email) {
                showFieldError('facultyEmail', 'Please enter email');
                hasError = true;
            } else if (!emailPattern.test(email)) {
                showFieldError('facultyEmail', 'Invalid email format (e.g. name@gmail.com)');
                hasError = true;
            }

            if (id) {
                const index = facultyData.findIndex(f => f.id == id);
                if (index !== -1) {
                    if (hasError) return;

                    facultyData[index].name = name;
                    facultyData[index].designation = designation;
                    facultyData[index].department = department;
                    facultyData[index].description = description;
                    facultyData[index].email = email;

                    if (imageInput.files && imageInput.files[0]) {
                        if (imageInput.files[0].size > 2 * 1024 * 1024) {
                            showFieldError('facultyImage', 'File size should be less than 2MB');
                            return;
                        }
                        const reader = new FileReader();
                        reader.onload = function (e) {
                            facultyData[index].image = e.target.result;
                            saveToLocalStorage();
                            loadFaculty();
                            closeFacultyModal();
                            showSuccess('Faculty updated successfully!');
                        };
                        reader.readAsDataURL(imageInput.files[0]);
                    } else {
                        saveToLocalStorage();
                        loadFaculty();
                        closeFacultyModal();
                        showSuccess('Faculty updated successfully!');
                    }
                }
            } else {
                if (!imageInput.files || !imageInput.files[0]) {
                    showFieldError('facultyImage', 'Please select an image');
                    hasError = true;
                }

                if (hasError) return;

                const file = imageInput.files[0];
                if (file.size > 2 * 1024 * 1024) {
                    showFieldError('facultyImage', 'File size should be less than 2MB');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function (e) {
                    const newFaculty = {
                        id: Date.now(),
                        name: name,
                        designation: designation,
                        department: department,
                        description: description,
                        email: email,
                        image: e.target.result
                    };

                    facultyData.unshift(newFaculty);
                    saveToLocalStorage();
                    loadFaculty();
                    closeFacultyModal();
                    showSuccess('Faculty added successfully!');
                };
                reader.readAsDataURL(file);
            }
        }
        // Search Functionality
        document.addEventListener('input', function (e) {
            if (e.target && e.target.id === 'facultySearch') {
                const filter = e.target.value.toLowerCase();
                const rows = document.querySelectorAll('.faculty-table tbody tr');

                rows.forEach(row => {
                    const name = row.cells[1].textContent.toLowerCase();
                    const dept = row.cells[3].textContent.toLowerCase();

                    if (name.includes(filter) || dept.includes(filter)) {
                        row.style.display = "";
                    } else {
                        row.style.display = "none";
                    }
                });
            }
        });
        function loadFaculty() {
            const container = document.getElementById('uploadedItems');
            if (facultyData.length === 0) {
                container.innerHTML = '<div class="no-data">No Faculty Added yet</div>';
                return;
            }

            let html = `
                    <table class="faculty-table">
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Designation</th>
                                <th>Department</th>
                                <th>Description</th>
                                <th>Email</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

            facultyData.forEach(function (faculty) {
                html += `
                        <tr>
                            <td><img src="${faculty.image}" class="table-img" alt="Profile"></td>
                            <td>${faculty.name}</td>
                            <td>${faculty.designation}</td>
                            <td>${faculty.department}</td>
                            <td>${faculty.description}</td>
                            <td>${faculty.email}</td>
                            <td>
                                <div class="action-container">
                                    <button class="action-btn edit-btn" onclick="editFaculty(${faculty.id})" title="Edit"><i class="fas fa-edit"></i></button>
                                <button class="action-btn delete-btn" onclick="deleteFaculty(${faculty.id})" title="Delete"><i class="fas fa-trash"></i></button>
                                </div>
                            </td>       
                        </tr>
                    `;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function editFaculty(id) {
            const faculty = facultyData.find(f => f.id === id);
            if (!faculty) return;

            document.getElementById('facultyId').value = faculty.id;
            document.getElementById('facultyName').value = faculty.name;
            document.getElementById('facultyDesignation').value = faculty.designation;
            document.getElementById('facultyDepartment').value = faculty.department;
            document.getElementById('facultyDescription').value = faculty.description;
            document.getElementById('facultyEmail').value = faculty.email;

            document.getElementById('previewImage').src = faculty.image;
            document.getElementById('previewSection').style.display = 'block';

            document.getElementById('modalTitle').innerText = 'Edit Faculty';
            document.getElementById('saveBtn').innerText = 'Update Faculty';
            document.getElementById('cancelBtn').style.display = 'block';

            document.getElementById('facultyModal').style.display = 'flex';
        }

        function deleteFaculty(id) {
            idToDelete = id;
            document.getElementById('deleteModal').style.display = 'flex';
        }

        function confirmDelete() {
            if (idToDelete) {
                facultyData = facultyData.filter(f => f.id !== idToDelete);
                saveToLocalStorage();
                loadFaculty();
                showSuccess('Faculty deleted successfully!');
                closeDeleteModal();
            }
        }

        function resetForm() {
            document.getElementById('facultyId').value = '';
            document.getElementById('facultyName').value = '';
            document.getElementById('facultyDesignation').value = '';
            document.getElementById('facultyDepartment').value = '';
            document.getElementById('facultyDescription').value = '';
            document.getElementById('facultyEmail').value = '';
            document.getElementById('facultyImage').value = '';
            document.getElementById('previewSection').style.display = 'none';

            document.getElementById('modalTitle').innerText = 'Add Faculty';
            document.getElementById('saveBtn').innerText = 'Save Faculty';
            document.getElementById('cancelBtn').style.display = 'none';
            clearFieldErrors();
        }

        function saveToLocalStorage() {
            try {
                localStorage.setItem("facultyData", JSON.stringify(facultyData));
            } catch (e) {
                showError('Storage full! Please delete some old faculty.');
            }
        }

        function showSuccess(message) {
            const msg = document.getElementById('successMessage');
            msg.textContent = message;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        function showError(message) {
            const msg = document.getElementById('errorMessage');
            msg.textContent = message;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        function showFieldError(fieldId, message) {
            const field = document.getElementById(fieldId);
            let errorDiv = field.parentElement.querySelector('.field-error');
            if (!errorDiv) {
                errorDiv = document.createElement('div');
                errorDiv.className = 'field-error';
                field.parentElement.appendChild(errorDiv);
            }
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            field.style.borderColor = '#c0392b';
        }

        function clearFieldErrors() {
            document.querySelectorAll('.field-error').forEach(div => div.style.display = 'none');
            document.querySelectorAll('.form-group input').forEach(field => field.style.borderColor = '#ddd');
        }

        window.onclick = function (event) {
            const facultyModal = document.getElementById('facultyModal');
            const viewModal = document.getElementById('viewModal');
            const deleteModal = document.getElementById('deleteModal');

            if (event.target === facultyModal) closeFacultyModal();
            if (event.target === viewModal) closeViewModal();
            if (event.target === deleteModal) closeDeleteModal();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Time Table - Student View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="TimeTable.css">
</head>
<body>

    <div class="header">
        <h1>Time Table</h1>
        <a href="TTupload.html" class="add-btn text-decoration-none">
            <i class="fas fa-plus-circle me-1"></i> Add Time Table
        </a>
    </div>

    <div class="container mt-5 mb-5">
        <h2 class="section-title mb-4 text-center fw-bold" style="color: #1e3d59;">Available Time Tables</h2>

        <div class="custom-table-container">
            <div class="table-responsive">
                <table id="timetableList" class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th><i class="fas fa-file-alt me-2"></i>Time Table Name</th>
                            <th><i class="fas fa-calendar-alt me-2"></i>Upload Date</th>
                            <th class="text-center"><i class="fas fa-cog me-2"></i>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="timetableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="viewModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-bottom-0">
                    <h5 id="modalTitle" class="modal-title fw-bold w-100 text-center color-primary"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onclick="closeModal()"></button>
                </div>
                <div class="modal-body p-0">
                    <iframe id="pdfViewer" src="" style="width:100%; height:500px; border:none;"></iframe>
                </div>
                <div class="modal-footer border-top-0 d-flex justify-content-center pb-4">
                    <button id="modalDownloadBtn" class="btn-download px-4 py-2 text-decoration-none" onclick="downloadFromModal()">
                        <i class="fas fa-download me-2"></i>Download Now
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let timetables = JSON.parse(localStorage.getItem('timetables')) || [];
        let bsModal;

        document.addEventListener('DOMContentLoaded', function () {
            bsModal = new bootstrap.Modal(document.getElementById('viewModal'));
            loadTimetables();
        });

        function loadTimetables() {
            const tbody = document.getElementById('timetableBody');
            const tableContainer = document.querySelector('.custom-table-container');

            if (timetables.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center py-5 text-muted">No timetables available yet.</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            timetables.forEach(function (timetable) {
                const row = document.createElement('tr');
                row.innerHTML = `
                        <td class="fw-bold text-dark">${timetable.name}</td>
                        <td class="text-muted">${timetable.date}</td>
                        <td>
                            <div class="d-flex justify-content-center gap-2">
                                <button class="btn-view" onclick="viewTimetable(${timetable.id})">
                                    <i class="fas fa-eye me-1"></i> View
                                </button>
                                <button class="btn-download" onclick="downloadTimetable(${timetable.id})">
                                    <i class="fas fa-download me-1"></i> Download
                                </button>
                            </div>
                        </td>
                    `;
                tbody.appendChild(row);
            });
        }

        function viewTimetable(id) {
            const timetable = timetables.find(t => t.id === id);
            if (!timetable) return;

            document.getElementById('modalTitle').textContent = timetable.name;
            document.getElementById('pdfViewer').src = timetable.pdf;
            document.getElementById('modalDownloadBtn').setAttribute('data-id', id);
            bsModal.show();
        }

        function downloadTimetable(id) {
            const timetable = timetables.find(t => t.id === id);
            if (!timetable || !timetable.pdf) {
                alert('File not found!');
                return;
            }

            const link = document.createElement('a');
            link.href = timetable.pdf;
            link.download = timetable.name.replace(/\s+/g, '_') + '.pdf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function downloadFromModal() {
            const id = parseInt(document.getElementById('modalDownloadBtn').getAttribute('data-id'));
            downloadTimetable(id);
        }

        function closeModal() {
            document.getElementById('pdfViewer').src = "";
            bsModal.hide();
        }
    </script>
</body>
</html>
